# Blind Machine curated application bundle — gwas_chi_square.
#
# Reproduces the Chi-Square GWAS protocol of Blatt, Gusev, Polyakov & Goldwasser,
# "Secure large-scale genome-wide association studies using homomorphic
# encryption", PNAS 2020 (doi:10.1073/pnas.1918257117) — the one-degree-of-freedom
# ALLELIC ASSOCIATION test their `demo-chi2` prototype computes — under The Blind
# Machine's multiparty trust model and with the LEAST POWERFUL HE scheme that does
# the job: additive-only BFV. Each data owner forms the cross term g·y locally in
# the clear (they hold both g and y), so the server's whole circuit is a
# coordinate-wise sum; the chi-square ratio, odds ratio and p-value are computed on
# the project owner's machine after decryption.
#
# This manifest is the ONLY file the Rails platform parses. The author's pure
# functions in server.py / local_project_owner.py / local_data_owner.py own the
# computation; the numbered stage files are kit-owned shims that call them (see
# docs/rfcs/0002). This file owns the governance + review surface. See
# docs/application_structure.md for the schema and docs/application_catalog.md.
name: gwas_chi_square
version: 1.0.0

builder:
  type: uv
  project: env

crypto: tenseal-bfv           # display hint; real deps live in env/uv.lock
computation: additive_bfv     # server does ONLY homomorphic addition (g*y is
                              # precomputed LOCALLY by each data owner) — the same
                              # circuit class as the allele_frequency_count flagship
min_contributors: 20

# The published definition: the SNP coordinate list PLUS the case/control phenotype
# coding, both folded into the bundle SHA-256. Every contributor MUST encode against
# the identical definition or the blind sums are meaningless. `length` is the number
# of SNPs analysed in one run; the per-SNP series is chunked at 8192 slots per
# ciphertext (mirroring the paper's "batches of 4,096 SNPs" for the chi-square test).
# Set to 16,384 to match the Duality demo dataset (data/random_sample.csv).
input:
  genotype:
    type: integer_vector
    length: 16384
    value_domain: [0, 1, 2]     # alt-allele dosage per SNP; missing -> 0
    coordinates:
      kind: snp_dosage_block
      fields: [chrom, pos, ref, alt]
  phenotype:
    type: integer_scalar
    coding: case_control        # binary; 0 = control, 1 = case
    value_domain: [0, 1]
  # Each contributor uploads ONE packed blob co-packing that owner's chunked
  # (cipher_g, cipher_gy) series plus a tiny meta ciphertext into a single
  # deterministic BMCT1 container (magic b"BMCT1\n"). One blob per contributor keeps
  # the per-SNP chunks inseparable through the hosted worker's digest-sorting Stager.
  submitted_as: one_packed_ciphertext_container

output:
  shape: allelic_association_sufficient_statistics  # per-SNP Σg (c1) + Σgy (n11) + [#cases, N]
  exactness: exact              # BFV is exact in Z_t; sums (<= 2N) never overflow t
  tolerance: 0
  # The released chi-square / p-value / odds-ratio per SNP are a deterministic
  # cleartext function of these exact integer sufficient statistics.

release_policy:
  aggregate_only: true          # only the summed sufficient statistics are decrypted
  allowed_runs_per_project: 1   # run cap (differencing mitigation, not a defense)

# Additive-only + one packed blob per contributor. L=16,384 SNPs at 8192 slots =>
# 2 chunks per series (5 ciphertexts per contributor); a 200-contributor cohort's
# aggregate is small, so the additive flagship's budget suffices (bumped modestly).
resources:
  max_memory_mb: 8192
  max_wall_seconds: 3600
  max_ciphertext_mb: 1024

# Collaboration scenario (docs/rfcs/0002 §4.1): who runs which role's functions.
# `aggregate` = 1 project owner + N data owners.
scenario:
  name: aggregate
  roles:
    project_owner: { file: local_project_owner.py, functions: [ keygen, decrypt, decode ] }
    data_owner:    { file: local_data_owner.py,    functions: [ encode, encrypt ] }
    server:        { file: server.py,              functions: [ compute ] }

# Content-addressing digests. Computed at registry ingest — left null in the
# committed bundle ON PURPOSE (a computed bundle hash baked into this signed
# manifest would be self-referential). The authoritative digest NAMES the bundle
# (application-<name>@<digest>) and is recorded out-of-band (.blind-signature / DB).
# See applications/README.md § "Why the manifest ships null hash placeholders".
hashes:
  bundle: null
  env_lock: null
